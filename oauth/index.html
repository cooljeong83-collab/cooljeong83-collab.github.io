<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>로그인 처리 중…</title>
    <style>
      body { font-family: -apple-system, system-ui, sans-serif; padding: 20px; }
      .btn { display:inline-block; padding:12px 14px; border-radius:10px; background:#0f172a; color:#fff; text-decoration:none; font-weight:800; }
      .muted { color:#64748b; font-size:13px; line-height:1.4; }
      code { word-break: break-all; }
    </style>
  </head>
  <body>
    <h3>로그인 처리 중…</h3>
    <p class="muted">앱으로 돌아가는 중입니다. 자동으로 안 돌아가면 아래 버튼을 눌러주세요.</p>

    <p><a id="btn" class="btn" href="#">앱으로 돌아가기</a></p>
    <p class="muted">딥링크: <code id="link"></code></p>

<!DOCTYPE html>
<html>
<head>
    <title>Ginit Login Redirect</title>
</head>
<body>
    <script>
      (function () {
        const qs = new URLSearchParams(location.search);
        const code = qs.get("code") || "";
        const state = qs.get("state") || "";
        const error = qs.get("error") || "";

        const deep = new URL("ginitapp://oauth/kakao");
        if (code) deep.searchParams.set("code", code);
        if (state) deep.searchParams.set("state", state);
        if (error) deep.searchParams.set("error", error);

        const deepLink = deep.toString();
        document.getElementById("btn").href = deepLink;
        document.getElementById("link").textContent = deepLink;

        // 자동 이동 시도 (iOS는 막히면 버튼 클릭 필요)
        setTimeout(() => { location.href = deepLink; }, 50);
      })();
        // 카카오가 보낸 인증 코드를 포함해서 다시 앱으로 쏴주는 역할
        // 실제로는 Expo의 AuthSession이 이 처리를 자동으로 시도합니다.
        console.log("로그인 인증 처리 중...");
    </script>
  </body>
    <p>로그인이 완료되었습니다. 앱으로 돌아가지 않는다면 창을 닫아주세요.</p>
</body>
</html>
